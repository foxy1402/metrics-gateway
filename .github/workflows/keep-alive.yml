name: Keep Alive

on:
  schedule:
    - cron: '0 12 1,15 * *'  # runs on the 1st and 15th of every month at noon UTC

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Gigalixir
        run: |
          git remote add gigalixir https://${{ secrets.GIGALIXIR_EMAIL }}:${{ secrets.GIGALIXIR_API_KEY }}@git.gigalixir.com/metrics.git/
          git push gigalixir main